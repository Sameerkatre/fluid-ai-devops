apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluid-demo-dev
  namespace: argocd
  labels:
    env: dev
    project: fluid-demo
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # ── FIXED: GitHub repo (not Bitbucket) ──────────────────
    repoURL: https://github.com/Sameerkatre/fluid-ai-devops.git
    targetRevision: main
    path: gitops/envs/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: fluid-demo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
