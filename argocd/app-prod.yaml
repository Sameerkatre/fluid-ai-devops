apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluid-demo-prod
  namespace: argocd
  labels:
    env: prod
    project: fluid-demo
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Sameerkatre/fluid-ai-devops.git
    targetRevision: main
    path: gitops/envs/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: fluid-demo-prod

  # PROD: manual sync only — never auto-deploy to production
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
