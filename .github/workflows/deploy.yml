name: CI/CD — Build, Push, Deploy via ArgoCD GitOps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  IMAGE_NAME: fluid-demo

jobs:
  test:
    name: Lint & Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r app/requirements.txt flake8

      - name: Lint
        run: flake8 app/app.py --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Smoke test
        run: python -c "import sys; sys.path.insert(0, 'app'); import app; print('Import OK')"

  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag (short SHA)
        id: tag
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-gitops:
    name: Update GitOps Manifest (triggers ArgoCD)
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Update image tag in dev gitops manifest
        run: |
          sed -i "s|image: ${{ secrets.DOCKERHUB_USERNAME }}/fluid-demo:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/fluid-demo:latest|g" \
            gitops/envs/dev/backend.yaml
          echo "Updated to latest"
          grep "image:" gitops/envs/dev/backend.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.email "github-actions@fluid-ai.com"
          git config user.name "GitHub Actions Bot"
          git add gitops/envs/dev/backend.yaml
          git diff --staged --quiet || git commit -m "ci: update dev image to ${{ needs.build-push.outputs.image_tag }} [skip ci]"
          git push
